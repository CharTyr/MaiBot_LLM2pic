# MaiBot_LLM2pic 插件配置
# 版本: 4.2.0 - 出图保护与 NewAPI NAI 增强
#
# 本插件支持配置两个独立的图片生成模型：
# - anime: 二次元/动漫风格（文生图，自拍模式强制使用）
# - edit: 图片编辑/改图（图生图，需要用户提供图片）
#
# LLM 会根据用户请求自动判断使用哪个模型，也可以通过 /pic anime 或 /pic edit 手动指定

# ============================================================
# 插件基本配置
# ============================================================
[plugin]
enabled = true
config_version = "4.2.0"

# ============================================================
# 通用生成参数
# ============================================================
[generation]
# 默认风格：当 LLM 无法判断风格时使用
# 可选值: "anime" 或 "edit"
default_style = "anime"

# 全局附加提示词（会添加到所有生成的提示词前面，可留空）
custom_prompt_add = ""

# 图片裁切设置（用于去除 AI 生成的水印）
crop_enabled = false
crop_position = "bottom"  # 可选: top, bottom, left, right
crop_pixels = 40

[generation_guard]
# Tool 自动出图保护：减少误触发、重复触发和同群并发出图
enabled = true
pending_lock_enabled = true
negative_intent_block_enabled = true
explicit_request_min_interval_seconds = 30
proactive_min_interval_seconds = 240

# ============================================================
# Anime 模型配置（二次元/动漫风格）
# ============================================================
# 用于生成动漫角色、游戏角色、虚拟人物、可爱风格等
# 自拍模式会强制使用此模型
[anime]
# 是否启用此模型
enabled = true

# API 类型: "openai", "gradio", "sd_api", "novelai" 或 "newapi_nai"
# - openai: 使用 OpenAI 兼容的 chat/completions 端点
# - gradio: 使用 Gradio API（如 HuggingFace Space）
# - sd_api: 使用 Stable Diffusion API
# - novelai: 使用 NovelAI 官方 API（需要 NovelAI 订阅）
# - newapi_nai: 使用 NewAPI chat/completions 封装的 NAI 绘图渠道
api_type = "gradio"

# API 端点 URL（兼容旧配置；推荐改用下方按 api_type 分组的端点配置）
# Gradio 示例: "https://tongyi-mai-z-image-turbo.hf.space"
# OpenAI 示例: "https://api.openai.com/v1"
# NovelAI: 留空（使用官方端点）
base_url = "https://tongyi-mai-z-image-turbo.hf.space"

# API 密钥
# - Gradio: 可留空
# - NovelAI: 填写你的 Bearer Token（从 novelai.net 获取）
api_key = ""

# 模型名称（仅 OpenAI 类型需要，如 "dall-e-3", "gpt-image-1"）
model_name = ""

# --- 按 api_type 分组的端点参数（优先于上方兼容旧配置）---
[anime.regex_url]
# URL 模板模式：$1 会替换为 URL encode 后的 prompt，可把旧正则端点的画师串、负面词等保留在这里
base_url = ""
custom_prompt_add = "{{{masterpiece,best quality}}},"

[anime.gradio]
base_url = "https://tongyi-mai-z-image-turbo.hf.space"
custom_prompt_add = ""
resolution = "1024x1024 ( 1:1 )"
steps = 8
shift = 3
timeout = 120

[anime.openai]
base_url = "https://api.openai.com/v1"
api_key = ""
model_name = "gpt-image-1"
size = "1024x1024"
custom_prompt_add = ""

[anime.sd_api]
base_url = ""
api_key = ""
custom_prompt_add = ""
negative_prompt = ""
width = 832
height = 1216
steps = 28
cfg = 7
model_index = 9
seed = -1

[anime.novelai]
# 使用 NovelAI 官方 API 时，base_url 可留空，api_key 填写 NovelAI Bearer Token
api_key = ""
custom_prompt_add = ""
model = "nai-diffusion-4-5-full"
width = 832
height = 1216
steps = 28
scale = 5.0
sampler = "k_euler"
negative_prompt = ""
seed = -1
timeout = 120

[anime.newapi_nai]
# base_url 填服务提供方给出的 NewAPI 地址，例如 "https://api.tuercha.com/v1"
# api_key 填 NewAPI 密钥
# model_name 使用 /v1/models 返回的模型 ID，例如 "nai-diffusion-4-5-full"
base_url = ""
api_key = ""
model_name = "nai-diffusion-4-5-full"
custom_prompt_add = "{{{masterpiece,best quality}}},"
negative_prompt = "lowres, bad anatomy, bad hands, text, watermark"
size = "portrait"  # 可选: portrait, landscape, square, "832x1216" 或 [832,1216]
steps = 23
scale = 5
sampler = "k_euler_ancestral"
seed = -1
image_format = "png"
max_tokens = 100000
timeout = 180
retry_attempts = 3
proxy_mode = "auto"  # auto=先继承环境代理，失败时直连；inherit=始终继承；direct=直连
quality_toggle = true
auto_smea = false
variety_boost = false
extra_params = {}

# ============================================================
# Edit 模型配置（图片编辑/改图）
# ============================================================
# 用于图片+文字输入进行改图、图片编辑、风格转换等
# 仅支持 OpenAI chat/completions 格式（需要多模态能力）
[edit]
# 是否启用此模型
enabled = false

# API 类型: 图片编辑仅支持 "openai" 格式
api_type = "openai"

# API 端点 URL
base_url = ""

# API 密钥
api_key = ""

# 模型名称（如 "gpt-image-2", "gpt-4o" 等支持图片输入的模型）
model_name = "gpt-image-2"

# 该风格专用的附加提示词（留空则不添加）
custom_prompt_add = ""

[edit.openai]
base_url = ""
api_key = ""
model_name = "gpt-image-2"
size = ""
custom_prompt_add = ""

# ============================================================
# LLM 配置（用于生成提示词）
# ============================================================
[llm]
# 用于生成提示词的 LLM 模型名称（留空则使用系统默认的 planner 模型）
model_name = ""

# 传递给 LLM 的聊天记录条数上限（1-100）
context_message_limit = 20

# 获取聊天记录的时间范围（分钟，1-1440）
context_time_minutes = 30

# 提示词生成模式：danbooru / legacy
prompt_mode = "danbooru"

# Danbooru 模式提示词生成温度
temperature = 0.2

# Danbooru 模式默认是否启用 SFW 安全模板；draw_picture(nsfw_allowed=true) 可单次放开
danbooru_sfw_mode = true

# Danbooru 模式是否启用轻量 tag 排序
enforce_tag_order = true

# 自拍外貌 tag 过滤策略：auto / never / keep
selfie_appearance_policy = "auto"

# 自定义系统提示词（留空则使用默认提示词）
# 支持 {persona} 占位符用于插入人设信息
# LLM 会输出 JSON 格式：{"prompt": "...", "style": "anime|edit"}
system_prompt = ""

# ============================================================
# Danbooru Tag 检索增强
# ============================================================
[tag_retriever]
enabled = true
mode = "online"  # online / local
api_url = "https://sakizuki-danboorusearch.hf.space/api"
timeout = 90.0
search_limit = 30
search_top_k = 5
related_limit = 20
related_seed_count = 8
show_nsfw = false
popularity_weight = 0.15
fallback_local = true
top_k = 20
min_score = 0.3

# ============================================================
# 组件启用配置
# ============================================================
[components]
# 是否启用图片生成 Tool（LLM 智能触发）
enable_image_generation = true

# 是否启用 /pic 指令
# 用法: /pic <prompt>
#       /pic anime <prompt>  - 强制使用 anime 模型
#       /pic edit <prompt>   - 强制使用 edit 模型
enable_direct_pic_command = true

# ============================================================
# 向后兼容配置（可选，不推荐使用）
# ============================================================
# 如果 [anime] 和 [edit] 都未启用，将使用此配置
# 建议迁移到上面的 [anime] 和 [edit] 配置
[api]
api_type = "gradio"
base_url = "https://tongyi-mai-z-image-turbo.hf.space"
api_key = ""
